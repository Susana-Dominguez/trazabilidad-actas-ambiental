<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo} + ' | Gestión Ambiental'">Gestión Ambiental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/ambiental-theme.css}"/>
</head>

<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg navbar-dark navbar-ambiental">
    <div class="container">
        <a class="navbar-brand text-white text-decoration-none" href="/dashboard">
            🌿 Gestión Ambiental — Sistema de Trazabilidad
        </a>
        <div class="navbar-nav ms-auto flex-row align-items-center">
            <a class="nav-link" href="/dashboard"
               th:classappend="${active == 'dashboard'} ? ' active' : ''">Dashboard</a>
            <a class="nav-link nav-cta" href="/actas/nueva"
               th:classappend="${active == 'registro'} ? ' active' : ''">+ Registrar acta</a>
            <a class="nav-link nav-cta" href="/actas/consulta"
               th:classappend="${active == 'consulta'} ? ' active' : ''">Consultar actas</a>
        </div>
    </div>
</nav>

<script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
