<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Consulta | Trazabilidad Actas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark" style="background:#1b5e20">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Gestión Ambiental — Actas</a>
        <div class="navbar-nav ms-auto flex-row gap-3">
            <a class="nav-link text-white" href="/dashboard">Dashboard</a>
            <a class="nav-link text-white" href="/actas/nueva">Registrar</a>
        </div>
    </div>
</nav>
<main class="container py-4">
    <h1 class="h3 mb-3">Consulta de actas</h1>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" th:object="${filtro}">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Empresa</label>
                        <input class="form-control" name="empresa" th:value="${filtro.empresa}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Contrato</label>
                        <input class="form-control" name="numeroContrato" th:value="${filtro.numeroContrato}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Consecutivo</label>
                        <input class="form-control" name="consecutivo" th:value="${filtro.consecutivo}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Inspector</label>
                        <input class="form-control" name="inspector" th:value="${filtro.inspector}"/>
                    </div>
                </div>
                <div class="mt-3">
                    <button class="btn btn-primary" type="submit">Buscar</button>
                    <a class="btn btn-outline-secondary" href="/actas/consulta">Limpiar</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Consecutivo</th>
                    <th>Empresa</th>
                    <th>Contrato</th>
                    <th>Inspector</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Origen</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${resultados}">
                    <td th:text="${a.consecutivo}"></td>
                    <td th:text="${a.empresa}"></td>
                    <td th:text="${a.numeroContrato}"></td>
                    <td th:text="${a.inspector}"></td>
                    <td th:text="${a.fechaActa}"></td>
                    <td><span class="badge text-bg-secondary" th:text="${a.estado.etiqueta}"></span></td>
                    <td th:text="${a.origen}"></td>
                    <td><a th:href="@{/actas/{id}(id=${a.id})}">Detalle</a></td>
                </tr>
                <tr th:if="${resultados.isEmpty()}">
                    <td colspan="8" class="text-center text-muted py-4">Sin resultados. Ajuste filtros o registre una acta.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
