<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{layout :: head('Consulta de actas')}"></head>
<body class="ambiental-page page-consulta">

<nav th:replace="~{layout :: navbar('consulta')}"></nav>

<main class="container ambiental-main">
    <div class="page-header mb-4">
        <h1 class="h3 mb-1">Consulta de actas</h1>
        <p class="subtitle">Busque por empresa, contrato, consecutivo o inspector.</p>
    </div>

    <div class="glass-card mb-4">
        <div class="card-body p-4">
            <form method="get" th:object="${filtro}">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Empresa</label>
                        <input class="form-control" name="empresa" th:value="${filtro.empresa}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Contrato</label>
                        <input class="form-control" name="numeroContrato" th:value="${filtro.numeroContrato}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Consecutivo</label>
                        <input class="form-control" name="consecutivo" th:value="${filtro.consecutivo}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Inspector</label>
                        <input class="form-control" name="inspector" th:value="${filtro.inspector}"/>
                    </div>
                </div>
                <div class="mt-3">
                    <button class="btn btn-buscar" type="submit">Buscar</button>
                    <a class="btn btn-outline-ambiental" href="/actas/consulta">Limpiar</a>
                </div>
            </form>
        </div>
    </div>

    <div class="glass-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Consecutivo</th>
                    <th>Empresa</th>
                    <th>Contrato</th>
                    <th>Inspector</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Origen</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${resultados}">
                    <td th:text="${a.consecutivo}"></td>
                    <td th:text="${a.empresa}"></td>
                    <td th:text="${a.numeroContrato}"></td>
                    <td th:text="${a.inspector}"></td>
                    <td th:text="${a.fechaActa}"></td>
                    <td><span class="badge text-bg-secondary" th:text="${a.estado.etiqueta}"></span></td>
                    <td th:text="${a.origen}"></td>
                    <td><a th:href="@{/actas/{id}(id=${a.id})}">Detalle</a></td>
                </tr>
                <tr th:if="${resultados.isEmpty()}">
                    <td colspan="8" class="text-center text-muted py-4">Sin resultados. Ajuste filtros o registre una acta.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
