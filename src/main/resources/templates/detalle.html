<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{layout :: head('Detalle acta')}"></head>
<body class="ambiental-page page-detalle">

<nav th:replace="~{layout :: navbar('consulta')}"></nav>

<main class="container ambiental-main">
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0" th:text="'Acta ' + ${acta.consecutivo}">Acta</h1>
        <a class="btn btn-outline-ambiental" href="/actas/consulta">Volver</a>
    </div>

    <div class="row g-3">
        <div class="col-lg-7">
            <div class="glass-card mb-3">
                <div class="card-header"><strong>Datos del acta</strong></div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between bg-transparent"><span>Empresa</span><strong th:text="${acta.empresa}"></strong></li>
                    <li class="list-group-item d-flex justify-content-between bg-transparent"><span>N.º contrato</span><strong th:text="${acta.numeroContrato}"></strong></li>
                    <li class="list-group-item d-flex justify-content-between bg-transparent"><span>Inspector</span><strong th:text="${acta.inspector}"></strong></li>
                    <li class="list-group-item d-flex justify-content-between bg-transparent"><span>Fecha</span><strong th:text="${acta.fechaActa}"></strong></li>
                    <li class="list-group-item d-flex justify-content-between bg-transparent"><span>Estado</span><span class="badge text-bg-primary" th:text="${acta.estado.etiqueta}"></span></li>
                    <li class="list-group-item d-flex justify-content-between bg-transparent"><span>Origen</span><strong th:text="${acta.origen}"></strong></li>
                    <li class="list-group-item d-flex justify-content-between bg-transparent"><span>Tipo</span><strong th:text="${acta.tipoActa} ?: '-'"></strong></li>
                    <li class="list-group-item d-flex justify-content-between bg-transparent"><span>Correo origen</span><strong th:text="${acta.correoOrigen} ?: '-'"></strong></li>
                    <li class="list-group-item bg-transparent" th:if="${acta.rutaDocumento}">
                        <span class="text-muted small">Documento:</span>
                        <div th:text="${acta.rutaDocumento}"></div>
                    </li>
                </ul>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="glass-card mb-3">
                <div class="card-header"><strong>Cambiar estado (trazabilidad)</strong></div>
                <div class="card-body">
                    <form th:action="@{/actas/{id}/estado(id=${acta.id})}" method="post">
                        <div class="mb-2">
                            <select class="form-select" name="estado">
                                <option th:each="e : ${estados}" th:value="${e}" th:text="${e.etiqueta}" th:selected="${e == acta.estado}"></option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <input class="form-control" name="observacion" placeholder="Observación del cambio"/>
                        </div>
                        <button class="btn btn-ambiental w-100" type="submit">Actualizar estado</button>
                    </form>
                </div>
            </div>
            <div class="glass-card">
                <div class="card-header"><strong>Historial</strong></div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item bg-transparent" th:each="h : ${historial}">
                        <div class="small text-muted" th:text="${#temporals.format(h.fechaCambio, 'dd/MM/yyyy HH:mm')}"></div>
                        <div><span class="badge text-bg-light border" th:text="${h.estado.etiqueta}"></span></div>
                        <div class="small" th:text="${h.observacion}"></div>
                        <div class="small text-muted" th:text="'Por: ' + ${h.usuario}"></div>
                    </li>
                    <li class="list-group-item text-muted bg-transparent" th:if="${historial.isEmpty()}">Sin historial aún.</li>
                </ul>
            </div>
        </div>
    </div>
</main>

<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
