<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{layout :: head('Registrar acta')}"></head>
<body class="ambiental-page page-registro">

<nav th:replace="~{layout :: navbar('registro')}"></nav>

<main class="container ambiental-main">
    <div class="page-header mb-4">
        <h1 class="h3 mb-1">Registro de acta</h1>
        <p class="subtitle">Use cuando el acta llegue por <strong>Outlook</strong> (Survey123 o portal municipal).</p>
    </div>

    <div class="glass-card">
        <div class="card-body p-4">
            <form th:action="@{/actas}" th:object="${acta}" method="post" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Consecutivo *</label>
                        <input class="form-control" th:field="*{consecutivo}" placeholder="2026-005"/>
                        <div class="text-danger small" th:errors="*{consecutivo}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Empresa *</label>
                        <input class="form-control" th:field="*{empresa}" placeholder="Nombre contratista"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">N.º contrato *</label>
                        <input class="form-control" th:field="*{numeroContrato}" placeholder="CT-2024-018"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Inspector / gestor *</label>
                        <input class="form-control" th:field="*{inspector}"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Fecha acta *</label>
                        <input type="date" class="form-control" th:field="*{fechaActa}"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Estado *</label>
                        <select class="form-select" th:field="*{estado}">
                            <option th:each="e : ${estados}" th:value="${e}" th:text="${e.etiqueta}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Origen *</label>
                        <select class="form-select" th:field="*{origen}">
                            <option th:each="o : ${origenes}" th:value="${o}" th:text="${o}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tipo de acta</label>
                        <input class="form-control" th:field="*{tipoActa}" placeholder="Notificación, Minuta..."/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Correo origen (Outlook)</label>
                        <input class="form-control" th:field="*{correoOrigen}" placeholder="sostenible@..."/>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Referencia / caso</label>
                        <input class="form-control" th:field="*{referenciaCaso}"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Adjuntar PDF/Word (opcional)</label>
                        <input type="file" class="form-control" name="archivo" accept=".pdf,.doc,.docx"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observación inicial</label>
                        <textarea class="form-control" rows="2" th:field="*{observacionHistorial}" placeholder="Ej. Recibida en bandeja Outlook 09:15"></textarea>
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-ambiental">Guardar acta</button>
                    <a class="btn btn-outline-ambiental" href="/dashboard">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
